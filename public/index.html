<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Management System</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; }
    header { background: #2c3e50; color: white; padding: 16px 24px; }
    header h1 { font-size: 22px; }
    .container { max-width: 900px; margin: 30px auto; padding: 0 16px; }
    .card { background: white; border-radius: 8px; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h2 { margin-bottom: 16px; color: #2c3e50; font-size: 18px; }
    .form-group { margin-bottom: 14px; }
    label { display: block; margin-bottom: 4px; font-weight: bold; font-size: 14px; color: #555; }
    input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
    input:focus { outline: none; border-color: #2c3e50; }
    .error-msg { color: red; font-size: 12px; margin-top: 4px; display: none; }
    .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
    .btn-primary { background: #2c3e50; color: white; }
    .btn-danger { background: #e74c3c; color: white; }
    .btn-warning { background: #f39c12; color: white; }
    .btn:hover { opacity: 0.85; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { background: #2c3e50; color: white; padding: 12px; text-align: left; }
    td { padding: 10px 12px; border-bottom: 1px solid #eee; }
    tr:hover { background: #f9f9f9; }
    .alert { padding: 10px 14px; border-radius: 6px; margin-bottom: 16px; display: none; font-size: 14px; }
    .alert-success { background: #d4edda; color: #155724; }
    .alert-error { background: #f8d7da; color: #721c24; }
    .nav-link { display: inline-block; margin-top: 8px; color: #3498db; text-decoration: none; font-size: 14px; }
    .nav-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
<header>
  <h1>🎓 Student Management System</h1>
  <a href="/docs/" class="nav-link" style="color:#aad4f5;">📄 View API Docs</a>
</header>

<div class="container">
  <div class="card">
    <h2 id="form-title">Add New Student</h2>
    <div id="alert" class="alert"></div>
    <div class="form-group">
      <label>Full Name *</label>
      <input type="text" id="name" placeholder="Enter full name">
      <div class="error-msg" id="nameError">Name is required</div>
    </div>
    <div class="form-group">
      <label>Email Address *</label>
      <input type="email" id="email" placeholder="Enter email address">
      <div class="error-msg" id="emailError">Valid email is required</div>
    </div>
    <div class="form-group">
      <label>Course *</label>
      <input type="text" id="course" placeholder="Enter course name">
      <div class="error-msg" id="courseError">Course is required</div>
    </div>
    <input type="hidden" id="editId">
    <button class="btn btn-primary" onclick="submitForm()">➕ Add Student</button>
    <button class="btn" id="cancelBtn" onclick="cancelEdit()" style="display:none; background:#aaa; color:white; margin-left:8px;">Cancel</button>
  </div>

  <div class="card">
    <h2>Student Records</h2>
    <table>
      <thead>
        <tr>
          <th>ID</th><th>Name</th><th>Email</th><th>Course</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="studentTable">
        <tr><td colspan="5" style="text-align:center; color:#aaa;">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  const API = '/api/students';

  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = `alert alert-${type}`;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 3000);
  }

  function validateForm() {
    let valid = true;
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const course = document.getElementById('course').value.trim();

    document.getElementById('nameError').style.display = name ? 'none' : 'block';
    document.getElementById('courseError').style.display = course ? 'none' : 'block';

    const emailValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    document.getElementById('emailError').style.display = emailValid ? 'none' : 'block';
    document.getElementById('emailError').textContent = email ? 'Invalid email format' : 'Email is required';

    if (!name || !emailValid || !course) valid = false;
    return valid;
  }

  async function loadStudents() {
    const res = await fetch(API);
    const students = await res.json();
    const tbody = document.getElementById('studentTable');
    if (students.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#aaa;">No students found</td></tr>';
      return;
    }
    tbody.innerHTML = students.map(s => `
      <tr>
        <td>${s.id}</td>
        <td>${s.name}</td>
        <td>${s.email}</td>
        <td>${s.course}</td>
        <td>
          <button class="btn btn-warning" onclick="editStudent(${s.id},'${s.name}','${s.email}','${s.course}')" style="margin-right:6px;">✏️ Edit</button>
          <button class="btn btn-danger" onclick="deleteStudent(${s.id})">🗑️ Delete</button>
        </td>
      </tr>`).join('');
  }

  async function submitForm() {
    if (!validateForm()) return;
    const id = document.getElementById('editId').value;
    const body = {
      name: document.getElementById('name').value.trim(),
      email: document.getElementById('email').value.trim(),
      course: document.getElementById('course').value.trim()
    };
    const method = id ? 'PUT' : 'POST';
    const url = id ? `${API}/${id}` : API;
    const res = await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    if (res.ok) {
      showAlert(id ? 'Student updated!' : 'Student added!', 'success');
      cancelEdit();
      loadStudents();
    } else {
      const err = await res.json();
      showAlert(err.error || 'Something went wrong', 'error');
    }
  }

  function editStudent(id, name, email, course) {
    document.getElementById('editId').value = id;
    document.getElementById('name').value = name;
    document.getElementById('email').value = email;
    document.getElementById('course').value = course;
    document.getElementById('form-title').textContent = 'Edit Student';
    document.querySelector('.btn-primary').textContent = '💾 Update Student';
    document.getElementById('cancelBtn').style.display = 'inline-block';
    window.scrollTo(0, 0);
  }

  function cancelEdit() {
    document.getElementById('editId').value = '';
    document.getElementById('name').value = '';
    document.getElementById('email').value = '';
    document.getElementById('course').value = '';
    document.getElementById('form-title').textContent = 'Add New Student';
    document.querySelector('.btn-primary').textContent = '➕ Add Student';
    document.getElementById('cancelBtn').style.display = 'none';
  }

  async function deleteStudent(id) {
    if (!confirm('Delete this student?')) return;
    const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
    if (res.ok) { showAlert('Student deleted!', 'success'); loadStudents(); }
  }

  loadStudents();
</script>
</body>
</html>
